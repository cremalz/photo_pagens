 ══════════════════════════════════════════════════════════════════════
# BACKEND — onde o painel salva as alterações (DecapBridge, modo PKCE)
# ══════════════════════════════════════════════════════════════════════
backend:
  name: git-gateway
  repo: cremalz/photo_pagens
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/586e758e-ac43-4951-ac66-532d0325d7f2/pkce
  auth_token_endpoint: /sites/586e758e-ac43-4951-ac66-532d0325d7f2/token
  gateway_url: https://gateway.decapbridge.com
  commit_messages:
    create: Create {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    update: Update {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    delete: Delete {{collection}} "{{slug}}" - {{author-name}} <{{author-login}}> via DecapBridge
    uploadMedia: Upload "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    deleteMedia: Delete "{{path}}" - {{author-name}} <{{author-login}}> via DecapBridge
    openAuthoring: Message {{message}} - {{author-name}} <{{author-login}}> via DecapBridge
 
auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url
 
logo_url: https://decapbridge.com/decapcms-with-bridge.svg
site_url: https://photo-pagens.vercel.app
 
# Local, no seu computador, onde fica um "rascunho" de mídia antes do upload
media_folder: "imagens"
public_folder: "/imagens"
 
# ══════════════════════════════════════════════════════════════════════
# CONTEÚDO — o que aparece no painel pra edição
# ══════════════════════════════════════════════════════════════════════
collections:
 
  # ── Aba 1: Textos gerais do site (título, subtítulo, rodapé) ──────────
  - name: "configuracoes"
    label: "🏠 Textos do Site"
    files:
      - file: "content/site.json"
        label: "Título, subtítulo e rodapé"
        name: "site"
        fields:
          - label: "Título principal"
            name: "titulo"
            widget: "string"
            hint: "Aparece bem grande no topo do site"
          - label: "Subtítulo"
            name: "subtitulo"
            widget: "string"
            hint: "Aparece logo abaixo do título, ex: 'Fotografia — São Paulo'"
          - label: "Texto do rodapé"
            name: "rodape"
            widget: "string"
            hint: "Aparece no final da página"
 
  # ── Aba 2: Galeria de fotos (upload, categoria, legenda, ordem) ───────
  - name: "galeria"
    label: "📷 Galeria de Fotos"
    files:
      - file: "content/fotos.json"
        label: "Fotos do Portfólio"
        name: "fotos"
        fields:
          - label: "Fotos"
            name: "fotos"
            widget: "list"
            summary: "{{fields.categoria}} — {{fields.legenda}}"
            hint: "Arraste os itens pela alcinha (⠿) à esquerda pra mudar a ordem em que aparecem no site. Clique em '+ Adicionar' pra incluir uma foto nova, ou no ✕ pra remover."
            fields:
              - label: "Foto"
                name: "imagem"
                widget: "image"
                hint: "Clique aqui pra enviar ou trocar a imagem"
              - label: "Categoria"
                name: "categoria"
                widget: "select"
                hint: "Define em qual filtro essa foto vai aparecer"
                options:
                  - { label: "Artístico", value: "artistico" }
                  - { label: "Gestante", value: "gestante" }
                  - { label: "Casal", value: "casal" }
                  - { label: "Profissional", value: "profissional" }
              - label: "Legenda (opcional)"
                name: "legenda"
                widget: "string"
                required: false
                hint: "Texto que aparece quando o visitante passa o mouse sobre a foto. Se deixar em branco, mostra o nome da categoria."