<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Minha princesa — Fotografia</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
 
<header>
  <h1 id="titulo-site">Minha princesa</h1>
  <p id="subtitulo-site">Fotografia — São Paulo</p>
</header>
 
<nav class="filtros">
  <button class="ativo" data-filtro="todos">Todos</button>
  <button data-filtro="artistico">Artístico</button>
  <button data-filtro="gestante">Gestante</button>
  <button data-filtro="casal">Casal</button>
  <button data-filtro="profissional">Profissional</button>
</nav>
 
<p class="contador" id="contador">Mostrando fotos...</p>
 
<main class="galeria" id="galeria">
  <!-- as fotos são inseridas via JavaScript a partir de content/fotos.json -->
</main>
 
<footer id="rodape-site">© 2026 Minha princesa Fotografia</footer>
 
<script src="script.js"></script>
 
</body>
</html>
